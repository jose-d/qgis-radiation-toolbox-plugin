image: python:3.11-alpine

test:
  stage: test
  script:
  - pip install -U sphinx
  - (cd help; sphinx-build -b html source public)
  only:
  - branches
  except:
  - master

pages:
  stage: deploy
  script:
  - pip install -U sphinx
  - (cd help; sphinx-build -b html source public)
  artifacts:
    paths:
    - help/public
  only:
  - master
