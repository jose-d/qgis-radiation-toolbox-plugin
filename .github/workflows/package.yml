name: Package QGIS plugin

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build installable zip
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            python3-pip \
            python3-sphinx \
            qt6-base-dev-tools \
            qt6-l10n-tools \
            unzip \
            zip

      - name: Build plugin package
        run: make package

      - name: Validate package contents
        run: |
          test -f radiation_toolbox_plugin.zip
          unzip -t radiation_toolbox_plugin.zip
          unzip -l radiation_toolbox_plugin.zip | grep 'radiation_toolbox_plugin/radiation_toolbox.py'
          unzip -l radiation_toolbox_plugin.zip | grep 'radiation_toolbox_plugin/resources.py'
          unzip -l radiation_toolbox_plugin.zip | grep 'radiation_toolbox_plugin/resources.rcc'
          unzip -l radiation_toolbox_plugin.zip | grep 'radiation_toolbox_plugin/radiation_toolbox_reader/__init__.py'
          rm -rf /tmp/radiation_toolbox_plugin_check
          mkdir -p /tmp/radiation_toolbox_plugin_check
          unzip -q radiation_toolbox_plugin.zip -d /tmp/radiation_toolbox_plugin_check
          ! grep -R -n -E 'from PyQt5|import PyQt5|Qt5Agg|backend_qt5agg|Qt\.LeftDockWidgetArea' \
            /tmp/radiation_toolbox_plugin_check/radiation_toolbox_plugin

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: radiation_toolbox_plugin
          path: radiation_toolbox_plugin.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach package to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: radiation_toolbox_plugin.zip
